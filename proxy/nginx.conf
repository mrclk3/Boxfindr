server {
    listen 80;
    server_name _;
    absolute_redirect off;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to FastAPI container (prioritize before /)
    location /api/ {
        set $api_upstream api:8200;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host api:8200;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect ~^http://api:8200/(.*)$ /api/$1;
        proxy_redirect ~^/(.*)$ /api/$1;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Proxy Next.js app (catch-all)
    location / {
        set $frontend_upstream frontend:3001;
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
